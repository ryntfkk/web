version: 1
frontend:
  phases:
    preBuild:
      commands:
        # npm install (bukan npm ci): lockfile digenerate di Windows, tapi Amplify
        # build di Linux. Dep opsional lintas-platform (mis. @img/sharp-wasm32 →
        # @emnapi/*) hanya di-resolve di Linux, sehingga `npm ci` yang ketat gagal
        # "Missing from lock file". `npm install` me-resolve dep yang benar di Linux.
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
customHeaders:
  - pattern: '/_next/static/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/images/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
  - pattern: '/img/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
