version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
customHeaders:
  - pattern: '/_next/static/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/images/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
  - pattern: '/img/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=86400'
